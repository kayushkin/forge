# Forge dev environments
# N.dev.kayushkin.com → env-N

# env-0
server {
    listen 80;
    server_name 0.dev.kayushkin.com;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl http2;
    server_name 0.dev.kayushkin.com;
    ssl_certificate     /etc/letsencrypt/live/kayushkin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kayushkin.com/privkey.pem;

    location /ws {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }
    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

